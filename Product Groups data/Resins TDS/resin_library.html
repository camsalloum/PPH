<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resin Grade Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F6FA;--surface:#FFFFFF;--surface2:#F0F2F8;--border:#E2E6F0;--border2:#D0D7EB;--text:#1A1F36;--muted:#6B7399;--muted2:#9BA3BF;--shadow:rgba(26,31,54,0.07);--shadow-lg:rgba(26,31,54,0.13);--HDPE:#2563EB;--LDPE:#059669;--LLDPE:#7C3AED;--mLLDPE:#D97706;--MDPE:#DB2777;--PP:#DC2626;--accent:#3B5BDB}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:20px;height:64px;box-shadow:0 1px 4px var(--shadow)}
.logo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--text);letter-spacing:0.06em;flex-shrink:0;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.hsep{width:1px;height:26px;background:var(--border);flex-shrink:0}
.sw{position:relative;flex:1;max-width:360px}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;outline:none;transition:border-color .18s,box-shadow .18s}
.search-input::placeholder{color:var(--muted2)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.1);background:var(--surface)}
.hcount{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.hcount strong{color:var(--text);font-weight:600}
.fbar{background:var(--surface);border-bottom:2px solid var(--border);padding:0 32px;display:flex;align-items:center;gap:6px;overflow-x:auto;min-height:52px}
.fbar::-webkit-scrollbar{display:none}
.flbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);font-weight:700;margin-right:2px;white-space:nowrap;flex-shrink:0}
.pill{background:transparent;border:1.5px solid var(--border);border-radius:100px;padding:5px 13px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0}
.pill:hover{border-color:var(--accent);color:var(--accent);background:rgba(59,91,219,.05)}
.pill.active{color:#fff!important;font-weight:600;border-color:transparent!important}
[data-type="ALL"].active{background:var(--text)}
[data-type="HDPE"].active{background:var(--HDPE)}
[data-type="LDPE"].active{background:var(--LDPE)}
[data-type="LLDPE"].active{background:var(--LLDPE)}
[data-type="mLLDPE"].active{background:var(--mLLDPE)}
[data-type="MDPE"].active{background:var(--MDPE)}
[data-type="PP"].active{background:var(--PP)}
[data-sup].active{background:var(--accent)}
.fsep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
.main{padding:28px 32px 64px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(318px,1fr));gap:16px}
.nr{text-align:center;padding:80px;color:var(--muted2);font-size:15px;display:none}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;animation:fu .28s ease both}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 32px var(--shadow-lg);border-color:var(--border2)}
.cal{height:3px}
.ch{padding:16px 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.cgrade{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--text)}
.csup{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:500}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0;margin-top:2px}
.cdesc{padding:0 18px 12px;font-size:12px;line-height:1.55;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.srow{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.sc{padding:10px 14px;text-align:center;border-right:1px solid var(--border)}
.sc:last-child{border-right:none}
.sv{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;white-space:nowrap}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);margin-top:2px;font-weight:600}
.cbot{padding:12px 18px 14px}
.slbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);font-weight:700;margin-bottom:7px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:10.5px;color:var(--muted);font-weight:500}
.fl{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.fi{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
.fd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ov{display:none;position:fixed;inset:0;background:rgba(26,31,54,.45);z-index:200;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:700px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 24px 64px rgba(26,31,54,.18);animation:mi .22s ease}
@keyframes mi{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mcl{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:10}
.mcl:hover{background:var(--border);color:var(--text)}
.mac{height:4px;border-radius:18px 18px 0 0}
.mhdr{padding:22px 28px 0}
.mg{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:var(--text)}
.mm{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.mbody{padding:18px 28px 28px}
.mdesc{font-size:13px;line-height:1.7;color:var(--muted);margin-bottom:22px;padding:14px 16px;background:var(--surface2);border-radius:8px;border-left:3px solid #3B5BDB}
.mst{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:var(--muted2);margin-bottom:10px;margin-top:20px}
.msg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.ms{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.msl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.msv{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;margin-top:3px}
.msu{font-size:10px;color:var(--muted);margin-top:1px}
.msm{font-size:9px;color:var(--muted2);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.mtags{display:flex;flex-wrap:wrap;gap:6px}
.mtag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:12px;color:var(--muted);font-weight:500}
.mfg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.madd{display:flex;flex-wrap:wrap;gap:6px}
.at{border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><div class="logo-dot"></div>ResinDB</div>
  <div class="hsep"></div>
  <div class="sw">
    <svg class="si" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="si" placeholder="Search grade, supplier, application…" autocomplete="off">
  </div>
  <div class="hcount" id="hc"><strong>37</strong> grades</div>
</header>
<div class="fbar">
  <span class="flbl">Type</span>
  <button class="pill active" data-type="ALL" onclick="sf('t','ALL',this)">All Types</button>
  <button class="pill" data-type="HDPE" onclick="sf('t','HDPE',this)">HDPE</button>
  <button class="pill" data-type="LDPE" onclick="sf('t','LDPE',this)">LDPE</button>
  <button class="pill" data-type="LLDPE" onclick="sf('t','LLDPE',this)">LLDPE</button>

  <button class="pill" data-type="MDPE" onclick="sf('t','MDPE',this)">MDPE</button>
  <button class="pill" data-type="PP" onclick="sf('t','PP',this)">Polypropylene</button>
  <div class="fsep"></div>
  <span class="flbl">Supplier</span>
  <button class="pill active" data-sup="ALL" onclick="sf('s','ALL',this)">All</button>
  <button class="pill" data-sup="Borouge" onclick="sf('s','Borouge',this)">Borouge</button>
  <button class="pill" data-sup="Chevron" onclick="sf('s','Chevron',this)">Chevron</button>
  <button class="pill" data-sup="DOW" onclick="sf('s','DOW',this)">DOW</button>
  <button class="pill" data-sup="EQATE" onclick="sf('s','EQATE',this)">EQATE</button>
  <button class="pill" data-sup="ExxonMobil" onclick="sf('s','ExxonMobil',this)">ExxonMobil</button>
  <button class="pill" data-sup="LyondellBasell" onclick="sf('s','LyondellBasell',this)">LyondellBasell</button>
  <button class="pill" data-sup="QAPCO" onclick="sf('s','QAPCO',this)">QAPCO</button>
  <button class="pill" data-sup="SABIC" onclick="sf('s','SABIC',this)">SABIC</button>
</div>
<main class="main">
  <div class="grid" id="grid"></div>
  <div class="nr" id="nr">No grades match your filters.</div>
</main>
<div class="ov" id="ov" onclick="cm(event)">
  <div class="modal" id="modal"><button class="mcl" onclick="cm()">×</button><div id="mc"></div></div>
</div>

const TC={HDPE:'#2563EB',LDPE:'#059669',LLDPE:'#7C3AED',mLLDPE:'#D97706',MDPE:'#DB2777',PP:'#DC2626'};
function tc(t){return TC[t]||'#3B5BDB';}
let ft='ALL',fs='ALL',fq='';
function render(){
  const q=fq.toLowerCase();
  const fi=G.filter(g=>(ft==='ALL'||g.t===ft)&&(fs==='ALL'||g.s===fs)&&(!q||[g.g,g.s,g.t,g.h,...g.ap,...g.fe,g.d].join(' ').toLowerCase().includes(q)));
  document.getElementById('hc').innerHTML='<strong>'+fi.length+'</strong> of '+G.length+' grades';
  const grid=document.getElementById('grid');
  const nr=document.getElementById('nr');
  if(!fi.length){grid.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  grid.innerHTML=fi.map((g,i)=>{
    const c=tc(g.t);const lb=c+'14';
    const s0=g.sp[0];
    const sm=g.sp.find(s=>s.l.includes('MFR')||s.l.includes('Melt Index'))||g.sp[1];
    const stm=g.sp.find(s=>s.l.includes('Melt Temp')||s.l.includes('Peak Melt')||s.l.includes('DSC Melt'));
    const apps=g.ap.slice(0,5).map(a=>'<span class="tag">'+a+'</span>').join('');
    const feats=g.fe.slice(0,3).map(f=>'<div class="fi"><span class="fd" style="background:'+c+'"></span>'+f+'</div>').join('');
    return '<div class="card" style="animation-delay:'+i*.035+'s" onclick="om('+g.id+')">'
    +'<div class="cal" style="background:'+c+'"></div>'
    +'<div class="ch"><div><div class="cgrade">'+g.g+'</div><div class="csup">'+g.s+'</div></div>'
    +'<span class="badge" style="background:'+lb+';color:'+c+'">'+g.t+'</span></div>'
    +'<div class="cdesc">'+g.h+'</div>'
    +'<div class="srow">'
    +'<div class="sc"><div class="sv" style="color:'+c+'">'+(s0?s0.v:'—')+'</div><div class="sl">Density</div></div>'
    +'<div class="sc"><div class="sv" style="color:'+c+'">'+(sm?sm.v:'—')+'</div><div class="sl">MFR g/10min</div></div>'
    +'<div class="sc"><div class="sv" style="color:'+c+'">'+(stm?stm.v+'°C':'—')+'</div><div class="sl">Melt Temp</div></div>'
    +'</div>'
    +'<div class="cbot"><div class="slbl">Key Features</div><div class="fl">'+feats+'</div>'
    +'<div class="slbl">Applications</div><div class="tags">'+apps+(g.ap.length>5?'<span class="tag">+'+( g.ap.length-5)+'</span>':'')+'</div></div>'
    +'</div>';
  }).join('');
}
function sf(k,v,el){
  if(k==='t'){ft=v;document.querySelectorAll('[data-type]').forEach(p=>p.classList.toggle('active',p.dataset.type===v));}
  else{fs=v;document.querySelectorAll('[data-sup]').forEach(p=>p.classList.toggle('active',p.dataset.sup===v));}
  render();
}
function om(id){
  const g=G.find(x=>x.id===id);if(!g)return;
  const c=tc(g.t);const lb=c+'12';
  const sp=g.sp.map(s=>'<div class="ms"><div class="msl">'+s.l+'</div><div class="msv" style="color:'+c+'">'+s.v+'</div><div class="msu">'+s.u+'</div><div class="msm">'+s.m+'</div></div>').join('');
  const ap=g.ap.map(a=>'<span class="mtag">'+a+'</span>').join('');
  const fe=g.fe.map(f=>'<div class="fi"><span class="fd" style="background:'+c+'"></span>'+f+'</div>').join('');
  const ad=g.ad.length?g.ad.map(a=>'<span class="at" style="background:'+lb+';border:1px solid '+c+'40;color:'+c+'">'+a+'</span>').join(''):'<span style="color:#9BA3BF;font-size:12px">No specific additives listed</span>';
  document.getElementById('mc').innerHTML='<div class="mac" style="background:'+c+'"></div>'
  +'<div class="mhdr"><div class="mg">'+g.g+'</div>'
  +'<div class="mm"><span class="badge" style="background:'+lb+';color:'+c+'">'+g.t+'</span>'
  +'<span style="color:#6B7399;font-size:13px;font-weight:600">'+g.s+'</span>'
  +(g.b!==g.g?'<span style="color:#9BA3BF;font-size:12px;font-style:italic">'+g.b+'</span>':'')
  +'</div></div>'
  +'<div class="mbody"><div class="mdesc" style="border-left-color:'+c+'">'+g.d+'</div>'
  +'<div class="mst">Physical &amp; Typical Properties</div><div class="msg">'+sp+'</div>'
  +'<div class="mst">Applications</div><div class="mtags">'+ap+'</div>'
  +'<div class="mst">Key Features</div><div class="mfg">'+fe+'</div>'
  +'<div class="mst">Additives &amp; Formulation</div><div class="madd">'+ad+'</div>'
  +'</div>';
  document.getElementById('ov').classList.add('open');document.body.style.overflow='hidden';
}
function cm(e){if(e&&e.target!==document.getElementById('ov'))return;document.getElementById('ov').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cm();});
document.getElementById('si').addEventListener('input',function(){fq=this.value;render();});
render();
</script>
</body>
</html>
