    <!--
      Cache-corruption guard: Chrome's disk cache can become corrupted
      (ERR_CACHE_READ_FAILURE) causing every module/CSS load to fail.
      This inline script catches those failures and does ONE hard reload
      per session to force the browser to bypass the corrupted cache.
    -->
    <script>
      (function () {
        var KEY = '__pph_cache_reload';
        // Listen for resource load failures (CSS, JS, images)
        window.addEventListener('error', function (e) {
          // Only act on resource load errors, not JS runtime errors
          if (e && e.target && (e.target.tagName === 'LINK' || e.target.tagName === 'SCRIPT' || e.target.tagName === 'IMG')) {
            if (!sessionStorage.getItem(KEY)) {
              sessionStorage.setItem(KEY, '1');
              // Hard reload bypassing cache
              window.location.reload(true);
            }
          }
        }, true); // capture phase to catch before bubbling

        // Also catch dynamic import() failures (Vite chunks)
        window.addEventListener('unhandledrejection', function (e) {
          var msg = e && e.reason && (e.reason.message || String(e.reason));
          if (msg && (msg.indexOf('Failed to fetch dynamically imported module') !== -1 ||
                      msg.indexOf('error loading dynamically imported module') !== -1 ||
                      msg.indexOf('ERR_CACHE_READ_FAILURE') !== -1)) {
            if (!sessionStorage.getItem(KEY)) {
              sessionStorage.setItem(KEY, '1');
              window.location.reload(true);
            }
          }
        });

        // Clear the reload flag after successful load
        window.addEventListener('load', function () {
          sessionStorage.removeItem(KEY);
        });
      })();
